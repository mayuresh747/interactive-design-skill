<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace; }
    </style>
  </defs>
  <!-- Window -->
  <rect width="720" height="440" rx="10" fill="#0a0a0a"/>
  <!-- Title bar -->
  <rect width="720" height="36" rx="10" fill="#1a1a1a"/>
  <rect y="26" width="720" height="10" fill="#1a1a1a"/>
  <circle cx="20" cy="18" r="6" fill="#ef4444"/>
  <circle cx="40" cy="18" r="6" fill="#eab308"/>
  <circle cx="60" cy="18" r="6" fill="#22c55e"/>
  <text x="360" y="22" text-anchor="middle" fill="#71717a" font-size="11">Claude Code — URL Teardown</text>

  <!-- Content -->
  <text x="20" y="62" fill="#f59e0b" font-size="12">you &gt;</text>
  <text x="68" y="62" fill="#fafafa" font-size="12">Make something like example-agency.com</text>
  <text x="68" y="78" fill="#fafafa" font-size="12">but for a coffee brand, darker, more minimal</text>

  <text x="20" y="108" fill="#3b82f6" font-size="12">skill</text>
  <text x="68" y="108" fill="#6ee7b7" font-size="12">Starting URL teardown with Playwright...</text>

  <text x="68" y="138" fill="#fafafa" font-size="12" font-weight="600">Detected Patterns:</text>

  <text x="88" y="160" fill="#a1a1aa" font-size="11">Navigation:</text>
  <text x="196" y="160" fill="#fafafa" font-size="11">"sticky minimal"</text>
  <text x="340" y="160" fill="#71717a" font-size="11">(87% match)</text>

  <text x="88" y="180" fill="#a1a1aa" font-size="11">Hero:</text>
  <text x="196" y="180" fill="#fafafa" font-size="11">"3D/WebGL scene"</text>
  <text x="340" y="180" fill="#71717a" font-size="11">(92% match)</text>

  <text x="88" y="200" fill="#a1a1aa" font-size="11">Layout:</text>
  <text x="196" y="200" fill="#fafafa" font-size="11">"single-column story"</text>
  <text x="375" y="200" fill="#71717a" font-size="11">(95% match)</text>

  <text x="88" y="220" fill="#a1a1aa" font-size="11">Colors:</text>
  <text x="196" y="220" fill="#fafafa" font-size="11">closest to "Dark+Neon" palette</text>

  <text x="88" y="240" fill="#a1a1aa" font-size="11">Typography:</text>
  <text x="196" y="240" fill="#fafafa" font-size="11">"Clash Display + mono" system</text>

  <text x="88" y="260" fill="#a1a1aa" font-size="11">Animation:</text>
  <text x="196" y="260" fill="#fafafa" font-size="11">GSAP ScrollTrigger, Three.js, Lenis</text>

  <text x="88" y="280" fill="#a1a1aa" font-size="11">Scroll:</text>
  <text x="196" y="280" fill="#fafafa" font-size="11">2800vh canvas, sticky sections</text>

  <!-- Divider -->
  <line x1="20" y1="305" x2="700" y2="305" stroke="#27272a" stroke-width="1"/>

  <text x="68" y="330" fill="#3b82f6" font-size="12" font-weight="600">Step 1: Mood &amp; Direction</text>
  <text x="68" y="350" fill="#6ee7b7" font-size="12">Opening comparison page with 4 options...</text>

  <text x="88" y="378" fill="#fafafa" font-size="11">A "Dark Roast"</text>
  <text x="260" y="378" fill="#71717a" font-size="11">— black + warm amber + coffee photos</text>

  <text x="88" y="398" fill="#fafafa" font-size="11">B "Moody Editorial"</text>
  <text x="260" y="398" fill="#71717a" font-size="11">— charcoal + off-white + serif + film grain</text>

  <text x="88" y="418" fill="#fafafa" font-size="11">C "Industrial"</text>
  <text x="260" y="418" fill="#71717a" font-size="11">— concrete gray + exposed type + raw</text>

  <!-- Cursor blink -->
  <rect x="20" y="430" width="8" height="2" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
